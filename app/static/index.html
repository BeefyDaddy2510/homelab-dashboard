<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homepage Dash</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="#dashboard" data-view-link="dashboard" aria-label="Homepage Dash">
          <span class="brand-mark">H</span>
          <span>Homepage Dash</span>
        </a>

        <label class="search">
          <span>Search services</span>
          <input id="service-search" placeholder="Search services..." autocomplete="off" />
        </label>

        <nav class="nav">
          <button class="nav-button active" data-view-link="dashboard">Dashboard</button>
          <button class="nav-button" data-view-link="discovery">Discovery</button>
          <button class="nav-button" data-view-link="settings">Settings</button>
        </nav>

        <div class="top-actions">
          <button id="add-service" class="square-button" title="Add service">+</button>
          <button id="refresh-config" class="square-button" title="Refresh services">R</button>
        </div>
      </header>

      <main class="dashboard view active" id="view-dashboard">
        <section class="summary-grid" aria-label="Dashboard summary">
          <article class="panel summary-panel">
            <span class="panel-label">Local Network</span>
            <div class="summary-row">
              <div><strong id="service-count">0</strong><span>Services</span></div>
              <div><strong id="host-count">0</strong><span>Hosts</span></div>
              <div><strong id="node-count">-</strong><span>Nodes</span></div>
            </div>
          </article>

          <article class="panel proxmox-panel">
            <div class="panel-title-row">
              <span class="panel-label">Virtualization</span>
              <button id="refresh-proxmox" class="small-button">Refresh</button>
            </div>
            <div id="proxmox-grid" class="node-grid"></div>
          </article>

          <article class="panel clock-panel">
            <strong id="clock-time">--:--</strong>
            <span id="clock-date">Loading</span>
            <small id="api-status">Connecting</small>
          </article>
        </section>

        <section class="services-section">
          <div class="section-title-row">
            <div>
              <span class="panel-label">Services</span>
              <h1 id="config-note">Homepage</h1>
            </div>
          </div>
          <div id="services-grid" class="service-groups"></div>
        </section>
      </main>

      <main class="discovery view" id="view-discovery">
        <section class="panel discovery-panel">
          <div class="panel-title-row">
            <div>
              <span class="panel-label">Discovery</span>
              <h1>Network Scan</h1>
            </div>
            <span id="last-scan" class="muted">Never scanned</span>
          </div>
          <form id="scan-form" class="scan-form">
            <label>
              <span>CIDR</span>
              <input id="cidr" value="192.168.1.0/24" autocomplete="off" />
            </label>
            <label>
              <span>Ports</span>
              <input id="ports" value="22,80,443,5000,8000,8080,8123,9000,9443" autocomplete="off" />
            </label>
            <button class="primary" type="submit">Scan</button>
          </form>
          <div id="scan-results" class="scan-results"></div>
        </section>
      </main>

      <main class="settings view" id="view-settings">
        <section class="panel settings-panel">
          <div class="panel-title-row">
            <div>
              <span class="panel-label">Appearance</span>
              <h1>Settings</h1>
            </div>
            <button id="save-settings" class="primary">Save</button>
          </div>

          <div class="settings-grid">
            <label>
              <span>Theme</span>
              <select id="setting-theme">
                <option value="cosmic">Cosmic</option>
                <option value="dark">Dark</option>
                <option value="midnight">Midnight</option>
              </select>
            </label>
            <label>
              <span>Accent color</span>
              <input id="setting-accent" type="color" value="#5ee0b5" />
            </label>
            <label>
              <span>Panel opacity</span>
              <input id="setting-panel-opacity" type="range" min="35" max="95" value="82" />
            </label>
            <label class="wide">
              <span>Background URL</span>
              <input id="setting-background" placeholder="/assets/space-bg.png" />
            </label>
          </div>
        </section>
      </main>
    </div>

    <dialog id="service-dialog" class="dialog">
      <form id="service-form" method="dialog">
        <div class="dialog-head">
          <h2 id="dialog-title">Add Service</h2>
          <button value="cancel" class="square-button" title="Close">x</button>
        </div>
        <input type="hidden" id="service-group-index" />
        <input type="hidden" id="service-index" />
        <label>
          <span>Name</span>
          <input id="service-name" required placeholder="Home Assistant" />
        </label>
        <label>
          <span>URL</span>
          <input id="service-url" required placeholder="http://homeassistant.local:8123" />
        </label>
        <label>
          <span>Icon</span>
          <input id="service-icon" maxlength="16" placeholder="HA, icon name, or symbol" />
        </label>
        <label>
          <span>Group</span>
          <input id="service-group" placeholder="Apps" />
        </label>
        <label>
          <span>Description</span>
          <input id="service-description" placeholder="Smart home control" />
        </label>
        <div class="dialog-actions">
          <button id="delete-service" class="danger" type="button">Delete</button>
          <span></span>
          <button value="cancel" type="button" id="cancel-dialog">Cancel</button>
          <button class="primary" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
