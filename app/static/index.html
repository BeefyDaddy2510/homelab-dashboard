<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homelab Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="#services" aria-label="Homelab Dashboard">
          <span class="brand-mark"></span>
          <span>LAB DASH</span>
        </a>
        <label class="search">
          <span>Search</span>
          <input id="service-search" placeholder="Search..." autocomplete="off" />
        </label>
        <div class="top-actions">
          <button id="add-service" class="icon-button" title="Add service">+</button>
          <button id="refresh-config" class="icon-button" title="Refresh services">R</button>
        </div>
      </header>

      <main class="dashboard">
        <section class="hero-grid" aria-label="Dashboard summary">
          <article class="glass-card weather-card">
            <div class="mini-title">Local Network</div>
            <div class="weather-row">
              <div>
                <strong id="service-count">0</strong>
                <span>Services</span>
              </div>
              <div>
                <strong id="host-count">0</strong>
                <span>Hosts</span>
              </div>
              <div>
                <strong id="node-count">-</strong>
                <span>Nodes</span>
              </div>
            </div>
          </article>

          <article class="glass-card proxmox-card" id="proxmox">
            <div class="panel-head">
              <span class="mini-title">Virtualization</span>
              <button id="refresh-proxmox" class="tiny-button">Refresh</button>
            </div>
            <div id="proxmox-grid" class="node-strip"></div>
          </article>

          <article class="glass-card clock-card">
            <strong id="clock-time">--:--</strong>
            <span id="clock-date">Loading</span>
            <small id="api-status">Connecting</small>
          </article>
        </section>

        <section class="services-section" id="services">
          <div class="section-line">
            <span id="config-note">Services</span>
            <button id="edit-toggle" class="tiny-button">Edit</button>
          </div>
          <div id="services-grid" class="tile-groups"></div>
        </section>

        <section class="glass-card discovery-card" id="discovery">
          <div class="panel-head">
            <div>
              <span class="mini-title">Discovery</span>
              <h2>Network Scan</h2>
            </div>
            <span id="last-scan">Never scanned</span>
          </div>
          <form id="scan-form" class="scan-form">
            <label>
              <span>CIDR</span>
              <input id="cidr" value="192.168.1.0/24" autocomplete="off" />
            </label>
            <label>
              <span>Ports</span>
              <input id="ports" value="22,80,443,5000,8000,8080,8123,9000,9443" autocomplete="off" />
            </label>
            <button class="primary" type="submit">Scan</button>
          </form>
          <div id="scan-results" class="scan-results"></div>
        </section>
      </main>
    </div>

    <dialog id="service-dialog" class="service-dialog">
      <form id="service-form" method="dialog">
        <div class="dialog-head">
          <h2 id="dialog-title">Add Service</h2>
          <button value="cancel" class="icon-button" title="Close">x</button>
        </div>
        <input type="hidden" id="service-group-index" />
        <input type="hidden" id="service-index" />
        <label>
          <span>Name</span>
          <input id="service-name" required placeholder="Home Assistant" />
        </label>
        <label>
          <span>URL</span>
          <input id="service-url" required placeholder="http://homeassistant.local:8123" />
        </label>
        <label>
          <span>Icon</span>
          <input id="service-icon" maxlength="12" placeholder="HA, icon name, or symbol" />
        </label>
        <label>
          <span>Group</span>
          <input id="service-group" placeholder="Apps" />
        </label>
        <label>
          <span>Description</span>
          <input id="service-description" placeholder="Smart home control" />
        </label>
        <div class="dialog-actions">
          <button id="delete-service" class="danger" type="button">Delete</button>
          <span></span>
          <button value="cancel" type="button" id="cancel-dialog">Cancel</button>
          <button class="primary" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
